<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIプロンプト作成機 - 便利ツール集</title>
    <!-- React & ReactDOM (UI構築) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #efefef;
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 700px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            background-color: #000080;
            padding: 5px;
            font-size: 24px;
            text-align: center;
            margin: -20px -20px 20px -20px;
        }

        .description {
            font-size: 14px;
            margin-bottom: 20px;
            border-bottom: 1px dotted #666666;
            padding-bottom: 10px;
        }

        table.settings {
            width: 100%;
            border-collapse: collapse;
        }

        table.settings td {
            padding: 10px;
            border: 1px solid #cccccc;
        }

        .label {
            background-color: #e0e0e0;
            font-weight: bold;
            width: 200px;
        }

        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-area {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border: 2px outset #ffffff;
            background-color: #cccccc;
        }

        button:active {
            border: 2px inset #ffffff;
        }

        .result-area {
            margin-top: 30px;
        }

        .result-title {
            background-color: #008000;
            color: #ffffff;
            padding: 2px 10px;
            font-weight: bold;
            font-size: 14px;
        }

        pre {
            background-color: #000000;
            color: #00ff00;
            padding: 10px;
            border: 2px inset #ffffff;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: "MS Gothic", monospace;
            font-size: 12px;
            min-height: 100px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AIプロンプト作成機</h1>

        <div class="description">
            ChatGPTやClaudeなどのAIに対して、最適な指示（プロンプト）を出すための支援ツールです。<br>
            以下の項目を選択して「生成」ボタンを押してください。
        </div>

        <div id="root"></div>

        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const App = () => {
            const [role, setRole] = React.useState('マーケター');
            const [task, setTask] = React.useState('SNS用投稿を30日分作成する');
            const [tone, setTone] = React.useState('説得力のある・プロフェッショナル');
            const [generatedPrompt, setGeneratedPrompt] = React.useState('');
            const [isGenerating, setIsGenerating] = React.useState(false);

            const handleGenerate = () => {
                setIsGenerating(true);
                setTimeout(() => {
                    const prompt = `あなたは一流の【${role}】として振る舞ってください。\n\n以下の目的を達成するための最高品質のアウトプットを生成してください。\n【目的】：${task}\n\n【条件】\n・トーン＆マナー：${tone}\n・ターゲット読者が思わず行動を起こしたくなるような心理的トリガーを組み込むこと。\n・冗長な表現を避け、結論から述べること。\n・全体をマークダウン形式で見やすく構造化すること。\n\nまずはどのようなアプローチで作成するか、100文字程度で戦略を述べ、そのあとに実際のアウトプットを出力してください。`;
                    setGeneratedPrompt(prompt);
                    setIsGenerating(false);
                }, 500);
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(generatedPrompt);
                alert("クリップボードにコピーしました！");
            };

            return (
                <div>
                    <table class="settings">
                        <tr>
                            <td class="label">AIの役割 (Role)</td>
                            <td>
                                <select value={role} onChange={(e) => setRole(e.target.value)}>
                                    <option value="一流マーケター">一流マーケター (集客・販売)</option>
                                    <option value="トップセールスライター">トップセールスライター (文章作成)</option>
                                    <option value="カスタマーサクセス・プロ">カスタマーサクセス・プロ (顧客対応)</option>
                                    <option value="経営コンサルタント">経営コンサルタント (戦略立案)</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">実行させる内容 (Task)</td>
                            <td>
                                <select value={task} onChange={(e) => setTask(e.target.value)}>
                                    <option value="SNS用投稿を30日分作成する">SNS用投稿を30日分作成する</option>
                                    <option value="顧客からのクレーム・問い合わせに神対応する">顧客からのクレーム・問い合わせに神対応</option>
                                    <option value="高単価商品が売れるランディングページの構成案を作成する">高単価商品LPの構成案作成</option>
                                    <option value="ブログ記事のSEO最適化と見出し作成を行う">ブログ記事のSEO最適化と見出し構築</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">出力トーン (Tone)</td>
                            <td>
                                <select value={tone} onChange={(e) => setTone(e.target.value)}>
                                    <option value="説得力のある・プロフェッショナル">説得力のある・プロフェッショナル</option>
                                    <option value="親しみやすい・カジュアル">親しみやすい・カジュアル</option>
                                    <option value="情熱的・インフルエンサー風">情熱的・インフルエンサー風</option>
                                    <option value="論理的・客観的">論理的・客観的</option>
                                </select>
                            </td>
                        </tr>
                    </table>

                    <div class="btn-area">
                        <button onClick={handleGenerate}>
                            {isGenerating ? '生成中...' : 'プロンプトを生成する'}
                        </button>
                    </div>

                    {generatedPrompt && (
                        <div class="result-area">
                            <div class="result-title">生成結果</div>
                            <pre>{generatedPrompt}</pre>
                            <div style={{ textAlign: 'right', marginTop: '5px' }}>
                                <button onClick={copyToClipboard} style={{ padding: '2px 10px', fontSize: '12px' }}>
                                    コピーする
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
